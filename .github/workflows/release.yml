name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: mcp-bzm-apitest-linux-amd64
          - os: macos-13
            asset: mcp-bzm-apitest-macos-amd64
          - os: macos-latest
            asset: mcp-bzm-apitest-macos-arm64
          - os: windows-latest
            asset: mcp-bzm-apitest-windows-amd64.exe
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[build]"

    - name: Build binary
      run: python build.py

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset }}
        path: dist/${{ matrix.asset }}
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download binaries
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
